<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AStarAgent Planning State Machine</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f1f5f9;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 24px;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}
.card {
  background: #ffffff;
  border-radius: 20px;
  padding: 36px 44px 44px;
  box-shadow: 0 4px 32px rgba(0,0,0,.11);
}
h1 {
  text-align: center;
  font-size: 22px;
  font-weight: 700;
  color: #0f172a;
  margin-bottom: 5px;
}
.sub {
  text-align: center;
  font-size: 12px;
  color: #94a3b8;
  margin-bottom: 30px;
  font-family: 'Courier New', monospace;
  letter-spacing: 0.4px;
}
</style>
</head>
<body>
<div class="card">
  <h1>AStarAgent — Planning State Machine</h1>
  <p class="sub">AStarAgentPlanningState · maze_solver.py</p>

  <svg width="960" height="540" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
      </marker>
    </defs>

    <!-- ===================== EDGES ===================== -->

    <!-- Initial state dot -->
    <circle cx="480" cy="14" r="9" fill="#0f172a"/>
    <line x1="480" y1="23" x2="480" y2="29"
          stroke="#0f172a" stroke-width="2" marker-end="url(#arr)"/>

    <!-- 1. START → EXPANDING (straight down) -->
    <line x1="480" y1="80" x2="480" y2="205"
          stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="457" y="127" width="46" height="18" rx="3" fill="white"/>
    <text x="480" y="140" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">always</text>

    <!-- 2. EXPANDING → TRAVERSING (upper, curves up) -->
    <path d="M 566,222 C 612,174 624,174 675,222"
          fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="551" y="158" width="148" height="18" rx="3" fill="white"/>
    <text x="625" y="171" text-anchor="middle" font-size="11" fill="#475569">all 4 neighbors probed</text>

    <!-- 3. TRAVERSING → EXPANDING (lower, curves down) -->
    <path d="M 675,248 C 624,294 612,294 566,248"
          fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="556" y="298" width="136" height="18" rx="3" fill="white"/>
    <text x="624" y="311" text-anchor="middle" font-size="11" fill="#475569">destination reached</text>

    <!-- 4. TRAVERSING self-loop (top) -->
    <path d="M 738,205 C 712,152 810,152 782,205"
          fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="694" y="136" width="132" height="32" rx="4" fill="white"/>
    <text x="760" y="149" text-anchor="middle" font-size="11" fill="#475569">died during traversal</text>
    <text x="760" y="163" text-anchor="middle" font-size="11" fill="#475569">→ rebuild path</text>

    <!-- 5. EXPANDING → TELEPORT_RETURNING (upper, curves up) -->
    <path d="M 394,222 C 350,174 336,174 255,222"
          fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="268" y="158" width="138" height="18" rx="3" fill="white"/>
    <text x="337" y="171" text-anchor="middle" font-size="11" fill="#475569">probe caused teleport</text>

    <!-- 6. TELEPORT_RETURNING → EXPANDING (lower, curves down) -->
    <path d="M 255,248 C 336,294 350,294 394,248"
          fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="248" y="298" width="158" height="18" rx="3" fill="white"/>
    <text x="327" y="311" text-anchor="middle" font-size="11" fill="#475569">returned via reverse step</text>

    <!-- 7. EXPANDING → RECOVERING (down, left of center) -->
    <line x1="466" y1="264" x2="466" y2="390"
          stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="302" y="312" width="158" height="32" rx="4" fill="white"/>
    <text x="381" y="325" text-anchor="middle" font-size="11" fill="#475569">fire hit during probe</text>
    <text x="381" y="339" text-anchor="middle" font-size="11" fill="#475569">/ pre-check triggered</text>

    <!-- 8. RECOVERING → EXPANDING (up, right of center) -->
    <line x1="494" y1="390" x2="494" y2="264"
          stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="504" y="312" width="136" height="32" rx="4" fill="white"/>
    <text x="572" y="325" text-anchor="middle" font-size="11" fill="#475569">re-probe done /</text>
    <text x="572" y="339" text-anchor="middle" font-size="11" fill="#475569">fire impassable</text>

    <!-- 9. RECOVERING → TRAVERSING (diagonal bezier) -->
    <path d="M 572,412 C 666,372 716,308 760,264"
          fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="614" y="344" width="130" height="32" rx="4" fill="white"/>
    <text x="679" y="357" text-anchor="middle" font-size="11" fill="#475569">fire dir was last probe</text>
    <text x="679" y="371" text-anchor="middle" font-size="11" fill="#475569">→ resume traversal</text>

    <!-- 10. RECOVERING self-loop (bottom) -->
    <path d="M 458,449 C 434,498 526,498 502,449"
          fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="400" y="482" width="120" height="18" rx="3" fill="white"/>
    <text x="460" y="495" text-anchor="middle" font-size="11" fill="#475569">died in recovery</text>

    <!-- ===================== NODES ===================== -->

    <!-- START -->
    <rect x="405" y="29" width="150" height="51" rx="12"
          fill="#dbeafe" stroke="#3b82f6" stroke-width="2.5"/>
    <text x="480" y="61" text-anchor="middle" dominant-baseline="middle"
          font-size="16" font-weight="700" fill="#1e3a8a" letter-spacing="0.5">START</text>

    <!-- EXPANDING (main hub) -->
    <rect x="394" y="205" width="172" height="59" rx="12"
          fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
    <text x="480" y="227" text-anchor="middle"
          font-size="15" font-weight="700" fill="#14532d">EXPANDING</text>
    <text x="480" y="247" text-anchor="middle"
          font-size="11" fill="#166534">probe neighbors</text>

    <!-- TRAVERSING -->
    <rect x="673" y="205" width="174" height="59" rx="12"
          fill="#ffedd5" stroke="#ea580c" stroke-width="2.5"/>
    <text x="760" y="227" text-anchor="middle"
          font-size="15" font-weight="700" fill="#7c2d12">TRAVERSING</text>
    <text x="760" y="247" text-anchor="middle"
          font-size="11" fill="#9a3412">follow planned path</text>

    <!-- RECOVERING -->
    <rect x="388" y="390" width="184" height="59" rx="12"
          fill="#fee2e2" stroke="#dc2626" stroke-width="2.5"/>
    <text x="480" y="412" text-anchor="middle"
          font-size="15" font-weight="700" fill="#7f1d1d">RECOVERING</text>
    <text x="480" y="432" text-anchor="middle"
          font-size="11" fill="#991b1b">return after fire death</text>

    <!-- TELEPORT_RETURNING -->
    <rect x="53" y="205" width="204" height="59" rx="12"
          fill="#f3e8ff" stroke="#9333ea" stroke-width="2.5"/>
    <text x="155" y="227" text-anchor="middle"
          font-size="14" font-weight="700" fill="#3b0764">TELEPORT_RETURNING</text>
    <text x="155" y="247" text-anchor="middle"
          font-size="11" fill="#6b21a8">escape teleport detour</text>

  </svg>
</div>
</body>
</html>
